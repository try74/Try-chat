<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>CRITICAL FAILURE [RAID Protocol v2.0]</title>
    <style>
        body { 
            background: #000; 
            color: #ff0000; 
            font-family: 'Courier New', Courier, monospace; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            text-align: center; 
            font-weight: bold;
            text-transform: uppercase;
        }
        /* Анимация глитча (мерцания фона) */
        @keyframes glitch {
            0% { background: #000; }
            5% { background: #400; }
            10% { background: #000; }
            15% { background: #800; }
            20% { background: #000; }
            100% { background: #000; }
        }
        .active {
            animation: glitch 0.5s infinite; /* Частое мерцание */
        }
        #btn { 
            padding: 20px; 
            border: 4px solid #ff0000; 
            background: rgba(255, 0, 0, 0.1);
            cursor: pointer; 
            font-size: 24px;
        }
        #error-text {
            display: none;
            font-size: 50px;
            line-height: 1.2;
        }
    </style>
</head>
<body>
    <div id="btn">ОТКРЫТЬ КАРТУ СОЧИ</div>
    
    <div id="error-text">
        SYSTEM BREACH<br>
        [RAID_CORE_ERROR]<br>
        DATA CORRUPTED<br>
        ...<br>
        ...<br>
        ...
    </div>

    <script>
        const btn = document.getElementById('btn');
        const errorText = document.getElementById('error-text');
        const body = document.body;

        btn.onclick = function() {
            btn.style.display = 'none'; // Скрываем кнопку
            errorText.style.display = 'block'; // Показываем пафосный текст
            body.classList.add('active'); // Включаем глитч фона

            // --- НОВАЯ АГРЕССИВНАЯ ВИБРАЦИЯ ---
            if (navigator.vibrate) {
                // Агрессивный паттерн: 100мс вибро, 50мс пауза. 
                // Создает эффект "трясущихся рук" и системного сбоя.
                // Будет работать, пока вкладка открыта.
                setInterval(() => {
                    navigator.vibrate([100, 50]); 
                }, 150);
            }
        };

        // Редирект через 5 минут (чтобы не убить телефон окончательно)
        setTimeout(() => {
            window.location.href = "https://www.google.com";
        }, 300000); 
    </script>
</body>
</html>
